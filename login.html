<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles/login.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card-box text-center">

            <h2>🎮 Login</h2>
            <p class="subtitle">¡Vamos a aprender jugando!</p>

            <input type="email" id="email" placeholder="📧 Correo" class="form-control mb-3">

            <input type="password" id="password" placeholder="🔒 Contraseña" class="form-control mb-3">

            <button id="btnLogin" class="btn btn-play w-100">🚀 Ingresar</button>

            <p id="msg"></p>

            <p class="mt-2">
                ¿Nuevo? <a href="register.html">Crear cuenta</a>
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/supabase.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/login.js" defer></script>

</body>

</html>
