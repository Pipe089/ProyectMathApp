<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | ProyectMathApp</title>
    <link rel="icon" href="assets/icon.png" type="image/png">
    <link rel="stylesheet" href="styles/register.css">
</head>

<body>
    <div class="background-animation">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>
    <div class="splash-screen" id="splashScreen">
        <img src="assets/icon.png" alt="ProyectMathApp" class="splash-logo">
        <p class="splash-title">ProyectMathApp</p>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="assets/icon.png" alt="ProyectMathApp" class="auth-logo">
                <div>
                    <p class="eyebrow">¡Únete al aprendizaje!</p>
                    <h1 class="auth-title">Crear cuenta</h1>
                </div>
            </div>

            <p class="auth-subtitle">Regístrate para empezar a resolver retos y ganar puntos.</p>
            <div id="msg" class="message-box"></div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input id="email" type="email" class="input-field" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" type="password" class="input-field" placeholder="Al menos 6 caracteres">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar contraseña</label>
                <input id="confirm_password" type="password" class="input-field" placeholder="Repite la contraseña">
            </div>

            <button id="btnRegister" class="btn-primary">Registrarme</button>

            <p class="form-text">¿Ya tienes cuenta? <a class="form-link" href="login.html">Inicia sesión</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/register.js" defer></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splashScreen');
            if (!splash) return;
            setTimeout(() => splash.classList.add('hidden'), 1200);
        });
    </script>
</body>
</html>
