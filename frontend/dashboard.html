<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tu CSS -->
    <link rel="stylesheet" href="styles/dashboard.css">
    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <h2 id="bienvenida"></h2>

    <div id="formExtra" style="display:none;">
        <h2>¡Hola! Es tu primera vez aquí. Necesitamos estos datos para poder continuar.</h2>
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="number" id="edad" placeholder="Edad" min="5" max="15" required>

        <select id="institucion" required>
            <option value="">Selecciona institución</option>
            <option value="Institución Educativa Alfonso López">Institución Educativa Alfonso López</option>
            <option value="Colegio Nuestra Señora De Las Lajas">Colegio Nuestra Señora De Las Lajas</option>
            <option value="Colegio Champagnat Ipiales">Colegio Champagnat Ipiales</option>
            <option value="Institución Educativa Puenes">Institución Educativa Puenes</option>
            <option value="Institucion Educativa Jesus de Nazareth">Institucion Educativa Jesus de Nazareth</option>
            <option value="Institucion Educativa Gabriel Garcia Marquez">Institucion Educativa Gabriel Garcia Marquez</option>
            <option value="Institución Educativa Inmaculada Concepción">Institución Educativa Inmaculada Concepción</option>
            <option value="Institución Educativa Seminario">Institución Educativa Seminario</option>
            <option value="Institución Educativa Del Sur. Sede 3">Institución Educativa Del Sur. Sede 3</option>
            <option value="Institución Educativa del Sur">Institución Educativa del Sur</option>
            <option value="Institución Educativa Sucre">Institución Educativa Sucre</option>
            <option value="Centro Educativo El Placer">Centro Educativo El Placer</option>
            <option value="Institución Educativa Pérez Pallares">Institución Educativa Pérez Pallares</option>
            <option value="Escuela El Charco">Escuela El Charco</option>
        </select>

        <select id="rol" onchange="handleRoleChange()" required>
            <option value="">Selecciona tu rol</option>
            <option value="estudiante">Estudiante</option>
            <option value="docente">Docente</option>
        </select>

        <select id="grado" required>
            <option value="">Selecciona grado</option>
            <option value="primero">Primero</option>
            <option value="segundo">Segundo</option>
        </select>

        <button id="btnGuardar">Guardar perfil</button>
    </div>

    <button id="btnLogout">Cerrar sesión</button>

    <div id="progressCard" class="progress-card" style="display:none;">
        <div>
            <p class="progress-label">Nivel</p>
            <h3 id="progressLevel"></h3>
        </div>
        <div>
            <p class="progress-label">Puntos de exp</p>
            <h3 id="progressPoints"></h3>
        </div>
    </div>

    <p id="msg"></p>

    <section id="teacherView" class="teacher-view" style="display:none; margin-top: 2rem;">
        <div class="teacher-header mb-3">
            <h3 id="teacherTitle"></h3>
            <p id="teacherGradeLabel"></p>
        </div>
        <div id="studentsContainer"></div>

        <div id="studentReport" style="display:none; margin-top: 2rem;">
            <button id="btnBackToList" class="btn btn-secondary mb-3">← Volver al listado</button>
            <h4 id="reportTitle"></h4>
            <div id="reportSummary" class="mb-3"></div>
            <div id="reportResults"></div>
        </div>
    </section>

    <section id="modules" class="modules-section" style="display:none;">
        <div class="modules-header">
            <h3>Módulos de matemáticas</h3>
            <p id="grade-label"></p>
        </div>
        <div id="modulesGrid" class="modules-grid"></div>
    </section>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/supabase.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/dashboard.js" defer></script>

</body>

</html>
