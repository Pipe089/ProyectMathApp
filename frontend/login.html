<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ingreso | ProyectMathApp</title>
    <link rel="icon" href="assets/icon.png" type="image/png">
    <link rel="stylesheet" href="styles/login.css">
</head>

<body>
    <div class="background-animation">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>
    <div class="splash-screen" id="splashScreen">
        <img src="assets/icon.png" alt="ProyectMathApp" class="splash-logo">
        <p class="splash-title">ProyectMathApp</p>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <img src="assets/icon.png" alt="ProyectMathApp" class="auth-logo">
                <div>
                    <p class="eyebrow">¡Bienvenido de nuevo!</p>
                    <h1 class="auth-title">Iniciar sesión</h1>
                </div>
            </div>

            <p class="auth-subtitle">Accede a tu cuenta y continúa con tus ejercicios de matemáticas.</p>
            <div id="msg" class="message-box"></div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input id="email" type="email" class="input-field" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input id="password" type="password" class="input-field" placeholder="Tu contraseña segura">
            </div>

            <button id="btnLogin" class="btn-primary">Ingresar</button>

            <p class="form-text">¿Aún no tienes cuenta? <a class="form-link" href="register.html">Regístrate aquí</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/login.js" defer></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splashScreen');
            if (!splash) return;
            setTimeout(() => splash.classList.add('hidden'), 1200);
        });
    </script>
</body>

</html>
