<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sumas avanzadas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/sumas.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="game-shell">
        <section class="game-card">
            <header class="game-header">
                <div>
                    <h1>Sumas Avanzadas</h1>
                    <p id="userGreeting">¡Listo para sumar con números grandes y ganar XP!</p>
                </div>
                <div class="header-buttons">
                    <button id="btnBack" class="secondary-btn">Volver al Dashboard</button>
                    <button id="btnLogout" class="danger-btn">Cerrar sesión</button>
                </div>
            </header>

            <div id="gameInfo" class="game-info">
                <p id="roundText">Pregunta 1 de 7</p>
                <p id="scoreText">Puntos ganados: 0</p>
            </div>

            <div id="questionCard" class="question-card">
                <h2 id="questionText">¿Cuánto es 12 + 8?</h2>
                <input id="answerInput" type="number" placeholder="Escribe tu respuesta" autocomplete="off">
                <button id="btnSubmit" class="primary-btn">Enviar respuesta</button>
                <p id="feedback" class="feedback"></p>
            </div>

            <div id="endScreen" class="end-screen" style="display:none;">
                <h2>¡Felicidades!</h2>
                <p id="finalText">Has ganado 0 puntos de exp.</p>
                <p id="newTotalText"></p>
                <button id="btnFinish" class="primary-btn">Volver al Dashboard</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/sumas-avanzadas.js" defer></script>
</body>
</html>
