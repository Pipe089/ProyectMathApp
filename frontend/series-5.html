<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Series de 5 en 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/series-2.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <main class="game-shell">
        <section class="game-card">
            <header class="game-header">
                <div>
                    <h1>Series de 5 en 5</h1>
                    <p id="userGreeting">¡Vamos a jugar y aprender juntos!</p>
                </div>
            </header>

            <div id="gameInfo" class="game-info">
                <p id="roundText">Pregunta 1 de 5</p>
            </div>

            <div id="questionCard" class="question-card">
                <h2 id="questionText">¿Cuál es el próximo número?</h2>

                <div class="visual-question">
                    <div class="series-group" id="seriesDisplay">
                        <!-- Números de la serie generados por JS -->
                    </div>
                    <div class="arrow-sign">→</div>
                    <div class="question-number">?</div>
                </div>

                <div id="options" class="options-grid">
                    <!-- Opciones generadas por JS: botones con número -->
                </div>

                <p id="feedback" class="feedback"></p>
                <button id="actionButton" class="primary-btn" style="display:none;">Siguiente</button>
            </div>

            <div id="endScreen" class="end-screen" style="display:none;">
                <h2>¡Felicidades!</h2>
                <p id="finalText">¡Excelente trabajo!</p>
                <p id="newTotalText"></p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/series-5.js" defer></script>
</body>

</html>
